version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: billy
    binary: billy
    main: ./cmd/billy
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: slim
    ids: [billy]
    name_template: "billy_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: billy
    package_name: billy
    vendor: "jd4rider"
    homepage: "https://github.com/jd4rider/billy-app"
    maintainer: "jd4rider <noreply@github.com>"
    description: "Local-first AI coding assistant with Ollama and custom endpoints."
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    priority: optional
    meta: false
    contents:
      - src: README.md
        dst: /usr/share/doc/billy/README.md
        type: doc

brews:
  - name: billy
    repository:
      owner: jd4rider
      name: homebrew-billy
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/jd4rider/billy-app"
    description: "Local-first AI coding assistant with Ollama and custom endpoints."
    license: MIT
    test: |
      system "#{bin}/billy", "--version"
    install: |
      bin.install "billy"

scoops:
  - repository:
      owner: jd4rider
      name: scoop-billy
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/jd4rider/billy-app"
    description: "Local-first AI coding assistant with Ollama and custom endpoints."
    license: MIT

release:
  github:
    owner: jd4rider
    name: billy-app
  prerelease: auto
  name_template: "{{.Tag}}"
  header: |
    ## ⚠️ Billy.sh {{.Tag}} — Alpha

    This is alpha software. Expect rough edges and occasional breaking changes.

    ### Quick Install
    ```bash
    curl -fsSL https://raw.githubusercontent.com/jd4rider/billy-app/main/scripts/install.sh | bash
    ```

    After installing, run `ollama pull mistral` to download your first model.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
